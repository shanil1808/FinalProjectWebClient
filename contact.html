<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container-fluid p-0">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid">
                    <img src="images/logo.jpg" alt="SkyEagle Mobile Logo" class="skyeagle-logo-img d-none d-sm-block">

                    <a class="navbar-brand logo-skyeagle" href="index.html">
                        <h2 class="text-center">SkyEagle Mobile</h2>
                    </a>

                    <!--Toggler For Mobile View-->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav mx-auto">
                            <li class="nav-item active">
                                <a class="nav-link" href="index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="about.html">About</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="contact.html">Contact Us</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="products.html">Products</a>
                            </li>
                        </ul>

                        <ul class="navbar-nav ms-auto align-items-center">
                            <span class="auth-area d-flex"></span>

                            <li class="nav-item">
                                <a class="nav-link" href="wishlist.html">
                                    <i class="bi bi-heart me-1"></i>Wishlist
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="cart.html">
                                    <i class="bi bi-cart me-1"></i>Cart
                                </a>
                            </li>
                            <li class="nav-item">
                                <button class="btn btn-sm btn-light" onclick="toggleDarkMode()">
                                    <i class="bi bi-moon"></i>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div class="container py-5">
        <h2 class="text-center mb-4">Contact Us</h2>

        <div class="row">
            <div class="col-md-6">
                <h4>Send us a message</h4>

                <form id="contactForm">
                    <input type="text" id="name" class="form-control mb-2" placeholder="Your Name">
                    <input type="email" id="email" class="form-control mb-2" placeholder="Your Email">
                    <textarea id="message" class="form-control mb-3" rows="5" placeholder="Your Message"></textarea>
                    <button type="submit" class="btn btn-dark w-100">Send Message</button>
                </form>
            </div>

            <div class="col-md-6">
                <h4>Our Info</h4>
                <p><i class="bi bi-geo-alt"></i> Montreal, Canada</p>
                <p><i class="bi bi-envelope"></i> support@skyeagle.com</p>
                <p><i class="bi bi-telephone"></i> +1 (555) 123-4567</p>
            </div>
        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <h4>Message Sent</h4>
                <p>We will get back to you</p>
                <button class="btn btn-dark" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>

    <footer>
        <div>
            <p class="text-muted text-center">
                COPYRIGHT © 2026 ALL RIGHTS RESERVED | MADE BY SHANIL R APPADOO
            </p>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/about.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
