<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="container-fluid p-0">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid">
                    <img src="images/logo.jpg" alt="SkyEagle Mobile Logo" class="skyeagle-logo-img d-none d-sm-block">

                    <a class="navbar-brand logo-skyeagle" href="index.html">
                        <h2 class="text-center">SkyEagle Mobile</h2>
                    </a>

                    <!--Toggler For Mobile View-->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav mx-auto">
                            <li class="nav-item active">
                                <a class="nav-link" href="index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="about.html">About</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="contact.html">Contact Us</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="products.html">Products</a>
                            </li>
                        </ul>

                        <ul class="navbar-nav ms-auto align-items-center">
                            <span class="auth-area d-flex"></span>

                            <li class="nav-item">
                                <a class="nav-link" href="wishlist.html">
                                    <i class="bi bi-heart me-1"></i>Wishlist
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="cart.html">
                                    <i class="bi bi-cart me-1"></i>Cart
                                </a>
                            </li>
                            <li class="nav-item">
                                <button class="btn btn-sm btn-light" onclick="toggleDarkMode()">
                                    <i class="bi bi-moon"></i>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div class="container py-5">
        <h2 class="text-center mb-4">Checkout</h2>

        <div class="row">
            <div class="col-md-6">
                <h4>Billing Details</h4>

                <form id="checkoutForm">
                    <input type="text" id="name" class="form-control mb-2" placeholder="Full Name">
                    <input type="text" id="address" class="form-control mb-2" placeholder="Address">

                    <select id="payment" class="form-control mb-3">
                        <option value="">Select Payment Method</option>
                        <option>Paypal</option>
                        <option>Card</option>
                    </select>

                    <button type="submit" class="btn btn-dark w-100">Place Order</button>
                </form>
            </div>

            <div class="col-md-6">
                <h4>Order Summary</h4>
                <div id="summary"></div>

                <hr>

                <h5>Total: $<span id="total">0</span></h5>
            </div>
        </div>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">

            <h4>Order Placed Successfully</h4>
            <p>Thank you for your purchase!</p>

            <button class="btn btn-dark" data-bs-dismiss="modal" onclick="clearCart()">
                OK
            </button>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
